name: Monitor Page

on:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

env:
  SELECTOR: '[data-testid="car-list-results"]'
  STATE_FILE: ".github/monitor/s800.hash"
  URL: https://carfromjapan.com/cheap-used-honda-s800-for-sale

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ...run your monitor...

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add last_hash.txt

          if ! git diff --cached --quiet; then
            git commit -m "Update monitor state"
            git push
          fi
<div class="flex flex-col gap-5" data-testid="car-list-results">