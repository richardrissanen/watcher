name: Monitor Page

on:
  schedule:
    - cron: "*/30 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - name: Run monitor
        id: monitor
        continue-on-error: true
        env:
          URL: https://carfromjapan.com/cheap-used-honda-s800-for-sale
          SELECTOR: '[data-testid="car-list-results"]'
          STATE_FILE: ".github/monitor/car-list.hash"
        run: |
          elixir watcher.exs
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Commit updated state
        if: steps.monitor.outputs.exit_code != '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .github/monitor/car-list.hash

          git diff --cached --quiet || git commit -m "Update monitor state"
          git push

      - name: Notify change detected
        if: steps.monitor.outputs.exit_code == '2'
        run: |
          echo "🚗 Honda S800 listings changed!"