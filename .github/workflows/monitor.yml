name: Monitor Page

on:
  schedule:
    - cron: "*/30 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18"

      - name: Run monitor
        env:
          URL: https://carfromjapan.com/cheap-used-honda-s800-for-sale
          SELECTOR: '[data-testid="car-list-results"]'
          STATE_FILE: ".github/monitor/car-list.hash"
        run: elixir monitor.exs

      - name: Commit state
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .github/monitor/car-list.hash

          git diff --cached --quiet || git commit -m "Update monitor state"
          git push